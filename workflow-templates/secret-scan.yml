# Secret-scanning workflow — copy to .github/workflows/secret-scan.yml to activate.
#
# Runs gitleaks on every push and pull request so credentials are caught before
# they can land on a protected branch. Fails the check if any secret is detected.

name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  gitleaks:
    name: Detect secrets with Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff against the PR base, not just HEAD.
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment to enable the GitGuardian integration:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
