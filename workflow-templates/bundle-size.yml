# bundle-size.yml — Bundle size regression check
#
# Copy to .github/workflows/bundle-size.yml in your project.
# Fails PRs that push any JS chunk past 250 kB gzip or any CSS chunk past 50 kB.
# Adjust limits in .bundlesize.json at the project root.

name: Bundle Size

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Check bundle sizes
        run: pnpm bundlesize:check

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_number }}
          path: dist/
          retention-days: 7
